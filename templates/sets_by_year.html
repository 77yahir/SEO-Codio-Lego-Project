<!DOCTYPE html>
<html>
    <head>
        <title> Sets by Year</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>

    <body>
        <h1>LEGO Sets by Year</h1>

        <table>
            <tr>
                <th> Year </th>
                <th> Amount </th>
            </tr>

            {% for row in results %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
            </tr>
            {% endfor %}
        </table>

        <a href="/"> Back Home </a>
    </body>
</html>
