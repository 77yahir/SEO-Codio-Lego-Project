{% extends "layout.html" %}
{% block content %}

<section class="base">
    <div class="base-content">
        <p class="base-eyebrow">Welcome to LegoSearch</p>

        <h2>Find, track, and organize your favorite LEGO sets</h2>

        <p class="base-text">
            Search for your favorite LEGO sets, save the ones you like or want,
            and keep track of the sets you currently have.
        </p>

        <div class="base-actions">
            <a href="{{ url_for('dashboard') }}" class="btn-primary-custom">View Dashboard</a>
            <a href="{{ url_for('about') }}" class="btn-secondary-custom">Learn More</a>
        </div>
    </div>
</section>

{% endblock content %}
